<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layouts/base :: head}"><meta charset="UTF-8"/><title>Paciente</title></head>
<body>
<nav th:replace="~{layouts/base :: navbar('pacientes')}"></nav>
<div class="container-fluid px-4 py-4">
    <div class="page-header"><h2 th:text="${paciente.id == null} ? 'Novo Paciente' : 'Editar Paciente'">Paciente</h2><p>Preencha os dados</p></div>
    <div class="row justify-content-center"><div class="col-md-7"><div class="form-card">
        <form th:action="${paciente.id == null} ? '/web/pacientes/salvar' : '/web/pacientes/salvar/' + ${paciente.id}" method="post">
            <div class="row g-3">
                <div class="col-12"><label class="form-label">Nome Completo *</label><input type="text" class="form-control" name="nome" th:value="${paciente.nome}" placeholder="Nome completo" required/></div>
                <div class="col-md-6"><label class="form-label">E-mail *</label><input type="email" class="form-control" name="email" th:value="${paciente.email}" placeholder="email@exemplo.com" required/></div>
                <div class="col-md-6"><label class="form-label" th:text="${paciente.id == null} ? 'Senha *' : 'Nova Senha (vazio = manter)'">Senha</label><input type="password" class="form-control" name="senha" th:required="${paciente.id == null}" placeholder="Mínimo 6 caracteres"/></div>
                <div class="col-md-6"><label class="form-label">CPF *</label><input type="text" class="form-control" name="cpf" th:value="${paciente.cpf}" placeholder="000.000.000-00" required/></div>
                <div class="col-md-6"><label class="form-label">Telefone</label><input type="text" class="form-control" name="telefone" th:value="${paciente.telefone}" placeholder="(49) 99999-0000"/></div>
                <div class="col-md-6"><label class="form-label">Data de Nascimento</label><input type="date" class="form-control" name="dataNascimento" th:value="${paciente.dataNascimento}"/></div>
            </div>
            <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn btn-cf-primary px-4"><i class="bi bi-check-lg me-1"></i>Salvar</button>
                <a href="/web/pacientes" class="btn btn-outline-secondary px-4"><i class="bi bi-arrow-left me-1"></i>Cancelar</a>
            </div>
        </form>
    </div></div></div>
</div>
<div th:replace="~{layouts/base :: scripts}"></div>
</body></html>
