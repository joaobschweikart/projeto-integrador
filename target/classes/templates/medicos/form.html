<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layouts/base :: head}"><meta charset="UTF-8"/><title>Médico</title></head>
<body>
<nav th:replace="~{layouts/base :: navbar('medicos')}"></nav>
<div class="container-fluid px-4 py-4">
    <div class="page-header"><h2 th:text="${medico.id == null} ? 'Novo Médico' : 'Editar Médico'">Médico</h2><p>Preencha os dados do profissional</p></div>
    <div class="row justify-content-center"><div class="col-md-7"><div class="form-card">
        <form th:action="${medico.id == null} ? '/web/medicos/salvar' : '/web/medicos/salvar/' + ${medico.id}" method="post">
            <div class="row g-3">
                <div class="col-12"><label class="form-label">Nome Completo *</label><input type="text" class="form-control" name="nome" th:value="${medico.nome}" placeholder="Dr. Nome Completo" required/></div>
                <div class="col-md-6"><label class="form-label">E-mail *</label><input type="email" class="form-control" name="email" th:value="${medico.email}" placeholder="email@clinica.com" required/></div>
                <div class="col-md-6"><label class="form-label" th:text="${medico.id == null} ? 'Senha *' : 'Nova Senha (vazio = manter)'">Senha</label><input type="password" class="form-control" name="senha" th:required="${medico.id == null}" placeholder="Mínimo 6 caracteres"/></div>
                <div class="col-md-6"><label class="form-label">CRM *</label><input type="text" class="form-control" name="crm" th:value="${medico.crm}" placeholder="SC-12345" required/></div>
                <div class="col-md-6"><label class="form-label">Especialidade *</label>
                    <select class="form-select" name="especialidadeId" required>
                        <option value="">Selecione...</option>
                        <option th:each="e : ${especialidades}" th:value="${e.id}" th:text="${e.nome}" th:selected="${medico.especialidade?.id == e.id}"></option>
                    </select>
                </div>
            </div>
            <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn btn-cf-primary px-4"><i class="bi bi-check-lg me-1"></i>Salvar</button>
                <a href="/web/medicos" class="btn btn-outline-secondary px-4"><i class="bi bi-arrow-left me-1"></i>Cancelar</a>
            </div>
        </form>
    </div></div></div>
</div>
<div th:replace="~{layouts/base :: scripts}"></div>
</body></html>
