# =============================================================
# ClinicaFácil — application.properties
# =============================================================

# ── Datasource (MySQL) ───────────────────────────────────────
# Conexão com o banco MySQL local.
# Crie o schema manualmente antes de executar:
#   CREATE SCHEMA clinicafacil_db CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
spring.datasource.url=jdbc:mysql://localhost:3306/clinicafacil_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo
spring.datasource.username=root
spring.datasource.password=Clin@1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──────────────────────────────────────────
# update: cria/atualiza tabelas automaticamente com base nas @Entity
# (equivalente ao DDL automático; ideal para desenvolvimento)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ── Servidor ─────────────────────────────────────────────────
server.port=8080

# ── Springdoc / Swagger UI ───────────────────────────────────
# Acesse: http://localhost:8080/swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method

# ── Logs ─────────────────────────────────────────────────────
logging.level.br.com.clinicafacil=DEBUG
logging.level.org.hibernate.SQL=DEBUG
