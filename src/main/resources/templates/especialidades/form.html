<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layouts/base :: head}"><meta charset="UTF-8"/><title>Especialidade</title></head>
<body>
<nav th:replace="~{layouts/base :: navbar('especialidades')}"></nav>
<div class="container-fluid px-4 py-4">
    <div class="page-header"><h2 th:text="${especialidade.id == null} ? 'Nova Especialidade' : 'Editar Especialidade'">Especialidade</h2><p>Preencha os dados</p></div>
    <div class="row justify-content-center"><div class="col-md-6">
        <div class="form-card">
            <form th:action="${especialidade.id == null} ? '/web/especialidades/salvar' : '/web/especialidades/salvar/' + ${especialidade.id}" method="post">
                <div class="mb-3"><label class="form-label">Nome *</label><input type="text" class="form-control" name="nome" th:value="${especialidade.nome}" placeholder="Ex: Cardiologia" required/></div>
                <div class="mb-4"><label class="form-label">Descrição</label><textarea class="form-control" name="descricao" rows="3" th:text="${especialidade.descricao}" placeholder="Descrição opcional"></textarea></div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-cf-primary px-4"><i class="bi bi-check-lg me-1"></i>Salvar</button>
                    <a href="/web/especialidades" class="btn btn-outline-secondary px-4"><i class="bi bi-arrow-left me-1"></i>Cancelar</a>
                </div>
            </form>
        </div>
    </div></div>
</div>
<div th:replace="~{layouts/base :: scripts}"></div>
</body></html>
