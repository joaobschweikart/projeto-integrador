<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layouts/base :: head}"><meta charset="UTF-8"/><title>Médicos</title></head>
<body>
<nav th:replace="~{layouts/base :: navbar('medicos')}"></nav>
<div class="container-fluid px-4 py-4">
    <div class="page-header d-flex justify-content-between align-items-center">
        <div><h2><i class="bi bi-person-badge me-2"></i>Médicos</h2><p>Profissionais cadastrados</p></div>
        <a href="/web/medicos/novo" class="btn btn-cf-accent"><i class="bi bi-plus-lg me-1"></i>Novo Médico</a>
    </div>
    <div th:if="${sucesso}" class="alert alert-cf-success alert-dismissible fade show mb-3"><i class="bi bi-check-circle me-2"></i><span th:text="${sucesso}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
    <div th:if="${erro}" class="alert alert-cf-error alert-dismissible fade show mb-3"><i class="bi bi-exclamation-circle me-2"></i><span th:text="${erro}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
    <div class="card border-0 shadow-sm rounded-3"><div class="card-body p-0">
        <table class="table table-hover table-cf mb-0">
            <thead><tr><th>#</th><th>Nome</th><th>CRM</th><th>Especialidade</th><th>E-mail</th><th class="text-center">Ações</th></tr></thead>
            <tbody>
                <tr th:each="m : ${medicos}">
                    <td class="text-muted small" th:text="${m.id}">1</td>
                    <td class="fw-semibold" th:text="${m.nome}">—</td>
                    <td><span class="badge bg-primary" th:text="${m.crm}">—</span></td>
                    <td th:text="${m.especialidade?.nome ?: '—'}">—</td>
                    <td th:text="${m.email}">—</td>
                    <td class="text-center">
                        <a th:href="@{/web/medicos/editar/{id}(id=${m.id})}" class="btn btn-sm btn-outline-primary me-1"><i class="bi bi-pencil"></i></a>
                        <form th:action="@{/web/medicos/excluir/{id}(id=${m.id})}" method="post" class="d-inline" onsubmit="return confirm('Excluir este médico?')">
                            <button type="submit" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(medicos)}"><td colspan="6" class="text-center text-muted py-5"><i class="bi bi-person-x fs-2 d-block mb-2"></i>Nenhum médico. <a href="/web/medicos/novo">Cadastrar agora</a></td></tr>
            </tbody>
        </table>
    </div></div>
</div>
<div th:replace="~{layouts/base :: scripts}"></div>
</body></html>
